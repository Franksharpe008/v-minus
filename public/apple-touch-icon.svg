<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <defs>
    <linearGradient id="appleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED"/>
      <stop offset="100%" style="stop-color:#EC4899"/>
    </linearGradient>
    <filter id="appleGlow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="180" height="180" fill="#09090b" rx="40"/>
  <g filter="url(#appleGlow)">
    <text x="90" y="115" font-family="Arial Black, sans-serif" font-size="100" font-weight="900" text-anchor="middle" fill="url(#appleGrad)">V</text>
  </g>
  <rect x="40" y="130" width="100" height="6" fill="url(#appleGrad)" rx="3"/>
  <circle cx="145" cy="35" r="10" fill="url(#appleGrad)" opacity="0.7"/>
</svg>
