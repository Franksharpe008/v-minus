<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#09090b"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7C3AED"/>
      <stop offset="100%" style="stop-color:#EC4899"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1" fill="#ffffff" opacity="0.05"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Decorative elements -->
  <circle cx="100" cy="100" r="150" fill="url(#accentGrad)" opacity="0.1"/>
  <circle cx="1100" cy="530" r="200" fill="url(#accentGrad)" opacity="0.08"/>

  <!-- Main V Logo -->
  <g filter="url(#glow)">
    <text x="180" y="420" font-family="Arial Black, sans-serif" font-size="350" font-weight="900" fill="url(#accentGrad)">V</text>
  </g>
  <rect x="80" y="440" width="180" height="12" fill="url(#accentGrad)" rx="6"/>

  <!-- Tagline -->
  <text x="600" y="280" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="#ffffff">Viral Video Discovery</text>
  <text x="600" y="360" font-family="Arial, sans-serif" font-size="42" fill="#a1a1aa">AI-Powered Search • Global Trends • Real-Time</text>

  <!-- Feature badges -->
  <rect x="600" y="420" width="160" height="50" fill="#27272a" rx="25" stroke="#3f3f46" stroke-width="2"/>
  <text x="680" y="452" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#ffffff" text-anchor="middle">AI Translation</text>

  <rect x="780" y="420" width="140" height="50" fill="#27272a" rx="25" stroke="#3f3f46" stroke-width="2"/>
  <text x="850" y="452" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#ffffff" text-anchor="middle">9:16 Only</text>

  <rect x="940" y="420" width="120" height="50" fill="#27272a" rx="25" stroke="#3f3f46" stroke-width="2"/>
  <text x="1000" y="452" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#ffffff" text-anchor="middle">Theater Mode</text>

  <!-- URL -->
  <text x="1180" y="600" font-family="Monaco, monospace" font-size="24" fill="#52525b" text-anchor="end">v-minus.vercel.app</text>
</svg>
