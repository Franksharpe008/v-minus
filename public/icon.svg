<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED">
        <animate attributeName="stop-color" values="#7C3AED;#A855F7;#7C3AED" dur="3s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#EC4899">
        <animate attributeName="stop-color" values="#EC4899;#F472B6;#EC4899" dur="3s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="100" height="100" fill="#09090b" rx="22"/>
  <g filter="url(#glow)">
    <text x="50" y="68" font-family="Arial Black, sans-serif" font-size="64" font-weight="900" text-anchor="middle" fill="url(#mainGrad)">V</text>
  </g>
  <rect x="20" y="76" width="60" height="4" fill="url(#mainGrad)" rx="2">
    <animate attributeName="width" values="60;55;60" dur="2s" repeatCount="indefinite"/>
  </rect>
  <circle cx="78" cy="22" r="6" fill="url(#mainGrad)" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.4;0.8" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>
